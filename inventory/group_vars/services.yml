---
# Preserve AllowUsers exactly: cluster user + ansible automation account.
ssh_allow_users: "v2e ansible"
# --- v2e-compose deploy (ANS-3). Non-secret config only. Secrets
# (cf_dns_api_token, authelia_*) come from SOPS group_vars/all.yml. ---
compose_stack_repo_url: "https://github.com/v2e-sh/v2e-compose.git"
compose_stack_dir: /opt/v2e-compose
# Fail-fast before deploy: the traefik (DNS-01) + authelia secrets must be present.
compose_stack_required_secrets:
  - cf_dns_api_token
  # SSO Authelia (forward-auth + OIDC provider; replaced tinyauth 2026-07-06):
  - authelia_session_secret
  - authelia_storage_encryption_key
  - authelia_reset_password_jwt_secret
  - authelia_oidc_hmac_secret
  - authelia_oidc_issuer_key                  # RS256 PEM -> config/secrets/oidc.issuer.pem
  - authelia_admin_password_hash              # argon2id -> config/secrets/users_database.yml
  - authelia_oidc_arcane_client_secret_hash   # pbkdf2 (Authelia side)
  - authelia_oidc_grafana_client_secret_hash  # pbkdf2 (Authelia side)
  # SSO-2 app migration: plaintext client secrets for the RP apps (.env, D3-scoped):
  - authelia_oidc_arcane_client_secret        # plaintext (Arcane OIDC_CLIENT_SECRET)
  - authelia_oidc_grafana_client_secret       # plaintext (Grafana GENERIC_OAUTH secret)
compose_stack_stacks:
  - traefik
  - authelia        # SSO: forward-auth (authelia@docker) + OIDC provider
  - whoami
  # COMPOSE-3 — ops tooling, both TinyAuth-gated (arcane replaces the planned dockge):
  - semaphore
  - arcane
  # Phase G — observability (grafana + uptime-kuma gated; rest internal):
  - observability
compose_stack_domain: "v2e.sh"
compose_stack_internal_domain: "int.v2e.sh"
compose_stack_acme_email: "admin@v2e.sh"
compose_stack_cert_resolver: production
