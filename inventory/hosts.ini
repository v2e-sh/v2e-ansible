# Run this playbook FROM the control node (Ansible controller = control).
# Copy/clone the whole `ansible/` folder onto control and run it there — control
# already has SSH access to the internal nodes, so no jump host or extra keys.
#
#   control  -> managed locally (no SSH back into itself)
#   services -> direct SSH from control, reusing control's existing
#               ~/.ssh/config alias `services` (HostName 10.1.2.10, user v2e).

[control]
control01 ansible_connection=local

[services]
# `services` resolves via control's ~/.ssh/config (-> 10.1.2.10, IdentityFile
# ~/.ssh/id_ed25519). Replace with `ansible_host=10.1.2.10` if you drop that alias.
services01 ansible_host=services ansible_user=v2e

# Other internal node control can already reach (uncomment to manage it too):
# [agent]
# agent01 ansible_host=agent ansible_user=v2e

[all:vars]
ansible_python_interpreter=/usr/bin/python3
