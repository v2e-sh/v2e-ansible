# Run this playbook FROM the control node (controller = control), as the `ansible`
# automation user. control already holds the ansible mesh key + ~/.ssh/config, so
# no jump host or extra credentials are needed.
#
#   control  -> managed locally (no SSH back into itself)
#   services -> direct SSH from control as the ansible user (10.1.2.10)
#   agent    -> direct SSH from control as the ansible user (10.1.3.10)

[control]
control01 ansible_connection=local

[services]
services01 ansible_host=10.1.2.10 ansible_user=ansible

[agent]
agent01 ansible_host=10.1.3.10 ansible_user=ansible

# All Debian/Ubuntu hosts (python-capable). ansible.builtin plays target this
# group so the VyOS router (network_cli, added later as its own [vyos] group) is
# never in their scope.
[linux:children]
control
services
agent

[all:vars]
ansible_python_interpreter=/usr/bin/python3
