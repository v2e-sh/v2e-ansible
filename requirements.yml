roles:
  - name: geerlingguy.docker
    version: "7.9.0"
  - name: artis3n.tailscale
    version: "v5.0.1"

collections:
  # All versions are pinned exact; Renovate bumps them.
  - name: community.docker
    version: "5.2.0"
  - name: devsec.hardening
    version: "10.6.0"
  - name: community.sops
    version: "2.3.0"
