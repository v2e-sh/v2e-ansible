---
- name: Enable agent-brain pull timer
  ansible.builtin.systemd_service:
    name: agent-brain-pull.timer
    daemon_reload: true
    enabled: true
    state: started

- name: Enable agent-brain consolidate timer
  ansible.builtin.systemd_service:
    name: agent-brain-consolidate.timer
    daemon_reload: true
    enabled: true
    state: started
