---
# Reload (not restart) sshd, and only after the FULL assembled config validates,
# so even a bad drop-in can't drop your live session.
- name: Reload sshd
  # /run/sshd is ssh.service's RuntimeDirectory (socket-activated on Ubuntu 24.04),
  # so it's absent when no SSH session is active — e.g. on control during its local
  # cloud-init run. Create it so `sshd -t` can validate. Reload is best-effort:
  # socket-activated sshd reads config on each new connection, so if ssh.service
  # isn't active there's nothing to reload (|| true), and `sshd -t` stays the gate.
  ansible.builtin.shell: mkdir -p /run/sshd && /usr/sbin/sshd -t && (systemctl reload ssh || true)
  changed_when: true

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart fail2ban
  ansible.builtin.systemd_service:
    name: fail2ban
    state: restarted
