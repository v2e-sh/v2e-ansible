---
# General Debian/Ubuntu hardening. SSH changes are validated before placing and
# reloaded only if the full config validates — key auth is always preserved, so
# this can never lock you out.

- name: SSH — install hardening drop-in
  # No task-level `validate: sshd -t -f %s`: that validates the drop-in in
  # ISOLATION (ignores the main config's HostKeys) and false-fails on a host
  # without host keys. The handler's full `sshd -t` (whole assembled config)
  # is the real gate, and reload happens only if it passes.
  ansible.builtin.template:
    src: 10-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd
  when: deb_hardening_ssh

- name: Sysctl — network/kernel hardening drop-in
  ansible.builtin.copy:
    dest: /etc/sysctl.d/90-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by deb-hardening-basic.
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.all.log_martians = 1
      net.ipv4.tcp_syncookies = 1
      kernel.kptr_restrict = 2
      kernel.dmesg_restrict = 1
  notify: Reload sysctl
  when: deb_hardening_sysctl

- name: Fail2ban — install (python3-systemd needed for the journal backend on Debian)
  ansible.builtin.apt:
    name:
      - fail2ban
      - python3-systemd
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: deb_hardening_fail2ban

- name: Fail2ban — enable sshd jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by deb-hardening-basic.
      [sshd]
      enabled = true
      # journal backend: bookworm has no rsyslog/auth.log, sshd logs to the journal.
      backend = systemd
  notify: Restart fail2ban
  when: deb_hardening_fail2ban

- name: Fail2ban — enabled and running
  ansible.builtin.systemd_service:
    name: fail2ban
    enabled: true
    state: started
  when: deb_hardening_fail2ban
