---
# Reload (not restart) sshd, and only after the FULL assembled config validates,
# so even a bad drop-in can't drop your live session.
- name: Reload sshd
  ansible.builtin.shell: /usr/sbin/sshd -t && systemctl reload ssh
  changed_when: true

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart fail2ban
  ansible.builtin.systemd_service:
    name: fail2ban
    state: restarted
