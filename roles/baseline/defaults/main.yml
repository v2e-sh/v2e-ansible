---
# Timezone applied to all managed nodes.
baseline_timezone: "UTC"

# Login passwords, set post-boot from SOPS instead of cloud-init chpasswd — so
# they never sit plaintext in the Proxmox snippet or tfstate. Empty = leave that
# account untouched (root stays locked; the admin user keeps whatever cloud-init
# seeded, if anything). SSH entry is key-only regardless (ssh_pwauth off); these
# passwords only gate console login and the admin user's sudo escalation.
#   baseline_root_password        -> root (console/`su` rescue only)
#   baseline_admin_login_password -> the human admin account (= its sudo password)
baseline_root_password: ""
baseline_admin_login_password: ""
baseline_admin_user: "v2e"

# systemd-journald disk cap (drop-in). Keeps logs from filling a small root disk.
baseline_journald_max_use: "200M"

# Packages every managed node should have. Pure baseline — app/runtime packages
# live in their own roles.
baseline_packages:
  - qemu-guest-agent
  - systemd-timesyncd
  - unattended-upgrades
  - python3-apt
  # acl: lets Ansible set file ACLs when a play uses `become_user` to drop to an
  # unprivileged account (e.g. ai_workbench preseeding the claude/codex accounts).
  # Without it Ansible falls back to an invalid `chmod A+...` and the task fails.
  - acl

# Security-net unattended-upgrades: autonomous *security* patching between the
# orchestrated (alemorvan.patchmanagement) runs. Reboots are owned by the
# orchestrated patch window, so the daemon must not reboot on its own.
baseline_unattended_auto_reboot: false
