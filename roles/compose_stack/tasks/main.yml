---
# Deploy the v2e-compose stacks on the services node. geerlingguy.docker (run
# before this role) provides the engine + compose plugin.

- name: Assert required SOPS secrets are present
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.vars', item, default='') | trim | length > 0
    fail_msg: >-
      compose_stack needs '{{ item }}' from the SOPS group_vars/all.sops.yaml
      (delivered by TF-2). It is missing/empty — set it (lowercase key) in your
      sops_secrets_file and re-run.
    quiet: true
  loop: "{{ compose_stack_required_secrets }}"

- name: Ensure git is installed (needed to clone v2e-compose)
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true
    cache_valid_time: 3600

# Keep the repo top-level ROOT-owned: git 2.35+ refuses to operate on a repo
# whose directory owner differs from the executing user ("dubious ownership").
# Also heals trees the pre-fix symlink task chowned to the operator (below).
- name: Ensure the stack dir exists and is root-owned (git safe-ownership)
  ansible.builtin.file:
    path: "{{ compose_stack_dir }}"
    state: directory
    owner: root
    group: docker
    mode: "0775"
    follow: false

- name: Clone the v2e-compose repository
  ansible.builtin.git:
    repo: "{{ compose_stack_repo_url }}"
    dest: "{{ compose_stack_dir }}"
    version: "{{ compose_stack_repo_version }}"

# Source-tree permissions BEFORE the first `compose up`: images running as non-root
# uids (grafana 472, loki 10001, prometheus 65534) must be able to read their
# bind-mounted configs at first start, or they crash-loop until a later chmod +
# restart-backoff happens to line up. Everything in the tree is public git content;
# the secrets live only in .env (rendered below with its own tight mode) and in
# runtime data dirs (excluded — traefik's acme.json must stay 0600).
- name: Make the stack tree readable (operator rw via docker group; non-root images o+rX)
  ansible.builtin.shell:
    cmd: >-
      chgrp -R docker {{ compose_stack_dir | quote }} &&
      find {{ compose_stack_dir | quote }} -path '*/data' -prune -o -exec chmod g+rwX,o+rX {} +
  changed_when: false

- name: Create the shared external frontend network
  community.docker.docker_network:
    name: "{{ compose_stack_network }}"
    state: present
  when: compose_stack_network | default('') | length > 0

# 0640 root:docker — docker-group members (the operator, the engine-adjacent
# tooling) can read it for manual `docker compose` runs; docker-group membership
# is root-equivalent anyway, so this adds no real exposure. World gets nothing.
- name: Render the shared .env (non-secret config + SOPS secrets)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ compose_stack_dir }}/.env"
    owner: root
    group: docker
    mode: "0640"
  no_log: true

# Authelia needs two secrets that can't be env-file values: the multiline RS256 issuer
# key and the users_database (which carries the admin argon2 hash). Render both from SOPS
# into the gitignored authelia/config/secrets/ dir (0600) so no credential hash lands in
# git. Only runs on a host that deploys the authelia stack.
- name: Provision Authelia out-of-band secrets (issuer key + users db) from SOPS
  when: "'authelia' in compose_stack_stacks"
  block:
    - name: Ensure the Authelia secrets dir exists (0700)
      ansible.builtin.file:
        path: "{{ compose_stack_dir }}/authelia/config/secrets"
        state: directory
        owner: root
        group: docker
        mode: "0750"

    - name: Render the OIDC issuer private key (RS256 PEM, 0640)
      ansible.builtin.copy:
        content: "{{ authelia_oidc_issuer_key }}"
        dest: "{{ compose_stack_dir }}/authelia/config/secrets/oidc.issuer.pem"
        owner: root
        group: docker
        mode: "0640"
      no_log: true

    - name: Render the Authelia users database (admin argon2 hash from SOPS, 0640)
      ansible.builtin.copy:
        dest: "{{ compose_stack_dir }}/authelia/config/secrets/users_database.yml"
        owner: root
        group: docker
        mode: "0640"
        content: |
          ---
          users:
            admin:
              disabled: false
              displayname: 'Admin'
              password: '{{ authelia_admin_password_hash }}'
              email: 'admin@{{ compose_stack_internal_domain | default("int." + compose_stack_domain) }}'
              groups:
                - 'admins'
                - 'arcane-admins'
                - 'grafana-admins'
      no_log: true

- name: Deploy each compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ compose_stack_dir }}/{{ item }}"
    env_files:
      - ../.env
    state: present
  loop: "{{ compose_stack_stacks }}"
  loop_control:
    label: "{{ item }}"

# Human-operator conveniences: docker-group membership + a home symlink.
- name: Make the deployed stack manageable by the operator
  when: compose_stack_manage_user | default('') | length > 0
  block:
    - name: Add the operator to the docker group
      ansible.builtin.user:
        name: "{{ compose_stack_manage_user }}"
        groups: docker
        append: true

    # follow=false: set ownership on the LINK, not the target — with the default
    # follow=true this task silently chowned /opt/v2e-compose to the operator,
    # which broke git's safe-ownership check on every subsequent converge.
    - name: Symlink the stack into the operator's home (~/v2e-compose)
      ansible.builtin.file:
        src: "{{ compose_stack_dir }}"
        dest: "/home/{{ compose_stack_manage_user }}/v2e-compose"
        state: link
        owner: "{{ compose_stack_manage_user }}"
        group: "{{ compose_stack_manage_user }}"
        force: true
        follow: false
