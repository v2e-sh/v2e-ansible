---
# Deploy the v2e-compose stacks on the services node. geerlingguy.docker (run
# before this role) provides the engine + compose plugin.

- name: Assert required SOPS secrets are present
  ansible.builtin.assert:
    that:
      - cf_dns_api_token | default('') | trim | length > 0
      - tinyauth_auth_users | default('') | trim | length > 0
    fail_msg: >-
      compose_stack needs cf_dns_api_token and tinyauth_auth_users from the SOPS
      group_vars/all.sops.yaml (delivered by TF-2). One or both are missing/empty
      — set them (lowercase keys) in your sops_secrets_file and re-run.

- name: Ensure git is installed (needed to clone v2e-compose)
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Clone the v2e-compose repository
  ansible.builtin.git:
    repo: "{{ compose_stack_repo_url }}"
    dest: "{{ compose_stack_dir }}"
    version: "{{ compose_stack_repo_version }}"

- name: Create the shared external frontend network
  community.docker.docker_network:
    name: "{{ compose_stack_network }}"
    state: present

- name: Render the shared .env (non-secret config + SOPS secrets)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ compose_stack_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Deploy each compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ compose_stack_dir }}/{{ item }}"
    env_files:
      - ../.env
    state: present
  loop: "{{ compose_stack_stacks }}"
  loop_control:
    label: "{{ item }}"

# Make the stack visible/editable to a human operator: the compose files land in
# /opt owned by root, which the cluster user can't even read. Add them to the docker
# group, group-own the tree by docker (g+rwX), and symlink it into their home.
- name: Make the deployed stack manageable by the operator
  when: compose_stack_manage_user | default('') | length > 0
  block:
    - name: Add the operator to the docker group
      ansible.builtin.user:
        name: "{{ compose_stack_manage_user }}"
        groups: docker
        append: true

    # Group-own by docker + group rwX so the operator can read/edit the compose files,
    # but EXCLUDE any runtime data dir (e.g. traefik/data holds acme.json, which Traefik
    # refuses unless it is 0600 — a blanket recurse would break cert issuance). chgrp is
    # safe on those files (group has no access at 0600); only the mode must be left alone.
    - name: Group-own the stack tree by docker (source rwX; runtime data untouched)
      ansible.builtin.shell:
        cmd: >-
          chgrp -R docker {{ compose_stack_dir | quote }} &&
          find {{ compose_stack_dir | quote }} -path '*/data' -prune -o -exec chmod g+rwX {} +
      changed_when: false

    - name: Symlink the stack into the operator's home (~/v2e-compose)
      ansible.builtin.file:
        src: "{{ compose_stack_dir }}"
        dest: "/home/{{ compose_stack_manage_user }}/v2e-compose"
        state: link
        owner: "{{ compose_stack_manage_user }}"
        group: "{{ compose_stack_manage_user }}"
        force: true
