---
# Overridden by inventory/group_vars/services.yml (app estate) and
# inventory/group_vars/infra.yml (technitium + rustdesk). Secrets are NOT here —
# they come from the SOPS group_vars/all.sops.yaml (delivered by TF-2).
compose_stack_repo_url: ""
compose_stack_repo_version: main
compose_stack_dir: /opt/v2e-compose
compose_stack_stacks:
  - traefik
  - tinyauth
  - whoami
# Shared external bridge for Traefik-routed stacks. Empty string = skip creating
# it (the infra node's stacks are host-network and need no shared bridge).
compose_stack_network: frontend
compose_stack_domain: ""
compose_stack_acme_email: ""
compose_stack_cert_resolver: staging
# SOPS keys that must be non-empty on THIS host group before deploying — the
# fail-fast guard against a half-shipped secrets file. Empty here on purpose: each
# consuming group states its own required set (services = the traefik/tinyauth pair,
# infra = technitium's password) so a new group never silently inherits another's.
compose_stack_required_secrets: []
# Human operator who should be able to see/edit the deployed stack (added to the
# docker group; the stack dir is group-owned by docker and symlinked into their
# home as ~/v2e-compose). Empty string disables the convenience (root-only stack).
compose_stack_manage_user: v2e
