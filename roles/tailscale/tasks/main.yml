---
# Join the tailnet (codifies the hand-run `tailscale up` — HANDOVER §4/ANS-4).
# Deliberately skips (with a visible warning) when no auth key is in SOPS, so the
# unattended first boot never fails on a missing tailnet credential.

- name: Warn — tailscale_authkey not set, skipping tailnet join
  ansible.builtin.debug:
    msg: >-
      No tailscale_authkey in the SOPS secrets — skipping. Mint a REUSABLE auth
      key in the Tailscale admin console, add it to secrets.sops.yaml, re-run.
  when: tailscale_authkey | default('') | length == 0

- name: Compose the `tailscale up` arguments
  ansible.builtin.set_fact:
    tailscale_node_args: >-
      {{ ((['--ssh'] if tailscale_node_ssh | bool else [])
          + (['--advertise-routes=' ~ tailscale_node_advertise_routes]
             if tailscale_node_advertise_routes | length > 0 else [])
          + ([tailscale_node_extra_args]
             if tailscale_node_extra_args | length > 0 else []))
         | join(' ') }}
  when: tailscale_authkey | default('') | length > 0

- name: Install + bring up Tailscale (artis3n.tailscale)
  ansible.builtin.include_role:
    name: artis3n.tailscale
  vars:
    tailscale_args: "{{ tailscale_node_args }}"
    # Deterministic runs: install if missing, don't chase the latest package on
    # every converge (the artis3n default is state=latest).
    state: present
    # Passed as include params so they beat the role's own detection (set_fact):
    # map derivative codenames to a base pkgs.tailscale.com serves, and extend
    # the upstream distro map with Parrot (Debian base).
    apt_codename: >-
      {{ tailscale_node_codename_map.get(ansible_distribution_release | lower,
                                         ansible_distribution_release | lower) }}
    tailscale_debian_distro:
      pop!_os: ubuntu
      ubuntu: ubuntu
      debian: debian
      osmc: debian
      "linux mint": ubuntu
      parrot: debian
      "parrot security": debian
      "parrot os": debian
    # ...and the install.yml routing gate (verified live: Parrot reports
    # ansible_distribution="Parrot", which upstream's list doesn't contain, so
    # the Debian install branch never ran and the service task failed).
    tailscale_debian_family_distros:
      - Ubuntu
      - Debian
      - Pop!_OS
      - OSMC
      - Linux Mint
      - Parrot
  when: tailscale_authkey | default('') | length > 0
