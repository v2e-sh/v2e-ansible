---
# Wrapper around artis3n.tailscale (pinned in requirements.yml). The auth key
# (tailscale_authkey) comes from SOPS — use a REUSABLE key (M2: an ephemeral key
# drops the node from the tailnet on reboot). Per-node behaviour is set in
# group_vars (control advertises the lab supernet; infra just joins).
tailscale_node_ssh: true
# Subnet(s) this node advertises, e.g. "10.1.0.0/16" on control. Empty = none.
# Route approval + split-DNS (int.<domain> → infra) stay MANUAL in the Tailscale
# admin console — they are tailnet-side settings, not node-side.
tailscale_node_advertise_routes: ""
# Tailnet machine name (what shows in the exit-node picker / MagicDNS). Empty =
# use the OS hostname. Set this to give an exit node a clear label (e.g. "home")
# without renaming the underlying VM. NOTE: an admin-console rename would override
# this; we don't set one, so this flag is authoritative + survives re-registration.
tailscale_node_hostname: ""
# Advertise this node as an exit node (route other tailnet devices' internet
# traffic out through it). Enables IP forwarding (v4+v6) as Tailscale requires.
# Still needs one-time approval in the admin console. On a lab node this yields a
# home/residential egress IP — the "no-VPN" exit for sites that block VPN ranges.
# (For a Mullvad exit, use the Tailscale↔Mullvad add-on instead — no node config.)
tailscale_node_advertise_exit_node: false
# Free-form extra `tailscale up` args (e.g. "--advertise-exit-node" is handled by
# the flag above; use this only for anything not otherwise modelled).
tailscale_node_extra_args: ""
# Debian-family codenames pkgs.tailscale.com doesn't serve, mapped to their base.
# Parrot 'echo' = Debian 13 'trixie' (verified: /stable/debian/echo 404s) — the
# same derivative-codename trap as the cloudflared apt repo (see RUNBOOK gotchas).
tailscale_node_codename_map:
  echo: trixie
