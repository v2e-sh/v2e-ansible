---
# Unattended first-boot entry point. Run FROM control as the `ansible` user
# (see README). Statically imports the phase playbooks in order; health_check in
# 01-bootstrap is the fail-fast gate.
#
# Operational playbooks are NOT imported here — run them explicitly from
# playbooks/ops/ (killswitch, patch, vyos-hardening, agents, task-agent).

- name: Bootstrap phase (reachability, baseline OS, hardening)
  import_playbook: playbooks/01-bootstrap.yml
- name: Services phase (container runtime)
  import_playbook: playbooks/02-services.yml
- name: Applications phase (AI identities + workbench)
  import_playbook: playbooks/03-applications.yml
- name: Infra phase (Docker + Technitium/RustDesk stacks + internal zone)
  import_playbook: playbooks/04-infra.yml
- name: Tailnet phase (control subnet router + infra)
  import_playbook: playbooks/05-tailscale.yml
- name: Control desktop phase (autologin, resolver, RustDesk client)
  import_playbook: playbooks/06-control-desktop.yml
