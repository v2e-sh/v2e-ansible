---
# Installs and configures Docker on the control and services hosts
# using the vendored `docker` role (geerlingguy/ansible-role-docker).

- name: Install Docker on control and services hosts
  hosts: control:services
  become: true
  roles:
    - role: docker
      vars:
        # Keep the Compose v2 plugin (`docker compose ...`) installed.
        docker_install_compose_plugin: true
        # Users to add to the `docker` group so they can run docker without sudo.
        # docker_users:
        #   - deploy
