name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install ansible
      - run: ansible-playbook --syntax-check -i inventory/hosts.ini site.yml

  # Advisory: surfaces lint/style debt without blocking merges.
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install ansible ansible-lint yamllint
      - run: yamllint .
      - run: ansible-lint

  # Blocking: repo is currently secret-free; keep it that way.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest \
            filesystem /repo --only-verified --fail
