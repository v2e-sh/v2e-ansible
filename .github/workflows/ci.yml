name: ci
on:
  pull_request:
  push:
    branches: [main]
# Least privilege: jobs only read the repo; no write scopes are granted.
permissions:
  contents: read
jobs:
  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python -m pip install ansible
      # Install the Galaxy deps the playbooks depend on (roles → .galaxy/roles to
      # match roles_path; collections → default path) before resolving site.yml.
      - run: ansible-galaxy role install -r requirements.yml -p .galaxy/roles
      - run: ansible-galaxy collection install -r requirements.yml
      - run: ansible-playbook --syntax-check -i inventory/hosts.ini site.yml

  # Advisory: surfaces lint/style debt as warnings without blocking merges.
  # Drop the "|| echo" guards to make these blocking once the backlog is clear.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python -m pip install ansible ansible-lint yamllint
      - run: yamllint . || echo "::warning::yamllint reported findings (advisory)"
      - run: ansible-lint || echo "::warning::ansible-lint reported findings (advisory)"

  # Blocking: repo is currently secret-free; keep it that way.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        # Full git history so the secret scan covers every commit, not just the tip.
        with:
          fetch-depth: 0
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" \
            trufflesecurity/trufflehog:3.95.8@sha256:d52e62fe0237bf0199cb79f94593051300b0989d9aeab8b431001d9f75e469c1 \
            git file:///repo --only-verified --fail

  # Blocking: gitleaks pattern scan alongside TruffleHog (defense in depth).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml
